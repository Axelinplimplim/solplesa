<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para la mejor mamá ❤️</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(to bottom, #e3f2fd 0%, #bbdefb 100%);
            font-family: 'Verdana', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        #garden {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 350px;
            z-index: 10;
        }

        .flower-pot {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .flower-pot:active { transform: scale(0.9); }

        .pot { font-size: 3rem; }

        .message {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #d81b60;
            padding: 10px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            width: 120px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .flower-pot.bloomed .message {
            opacity: 1;
            bottom: 120%;
        }

        .flower {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            font-size: 2.5rem;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flower-pot.bloomed .flower { transform: translateX(-50%) scale(1); }

        h1 { position: absolute; top: 30px; color: #1565c0; width: 100%; font-size: 1.5rem; }
    </style>
</head>
<body>

    <h1>¡Toca las macetas para ver tus flores, mamá! 🌸</h1>

    <div id="garden">
        <div class="flower-pot" onclick="bloom(this)">
            <div class="message">Gracias por cuidarme tanto ❤️</div>
            <div class="flower">🌸</div>
            <div class="pot">🪴</div>
        </div>
        <div class="flower-pot" onclick="bloom(this)">
            <div class="message">Eres la mejor del mundo 🌎</div>
            <div class="flower">🌹</div>
            <div class="pot">🪴</div>
        </div>
        <div class="flower-pot" onclick="bloom(this)">
            <div class="message">Te quiero muchísimo mamá 🥰</div>
            <div class="flower">🌻</div>
            <div class="pot">🪴</div>
        </div>
        <div class="flower-pot" onclick="bloom(this)">
            <div class="message">Gracias por tus consejos ✨</div>
            <div class="flower">🌷</div>
            <div class="pot">🪴</div>
        </div>
    </div>

    <script>
        function bloom(el) {
            el.classList.toggle('bloomed');
        }
    </script>
</body>
</html>
